name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: bridge/package-lock.json

    - name: Install dependencies
      working-directory: bridge
      run: npm ci

    - name: Syntax check
      working-directory: bridge
      run: node --check bridge.mjs

    - name: Self-test
      working-directory: bridge
      run: node bridge.mjs --selftest
